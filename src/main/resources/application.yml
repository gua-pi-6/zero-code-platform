spring:
  profiles:
    active: local
  application:
    name: ai-code-generate-backend
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://localhost:3306/<database_name>
    username: <username>
    password: <password>
  data:
    redis:
      host: localhost
      port: 6379
      user: <redis_user>
      password: <redis_password>
      ttl: 3600
      database: 0
  # session 配置
  session:
    store-type: redis
    # session 30 天过期
    timeout: 2592000
pexels:
  api-key: <pexels_api_key>
server:
  port: 8123
  servlet:
    context-path: /api
    # cookie 30 天过期
    session:
      cookie:
        max-age: 2592000

# springdoc-openapi项目配置
springdoc:
  group-configs:
    - group: 'default'
      paths-to-match: '/**'
      packages-to-scan: com.chen.controller
# knife4j的增强配置，不需要增强可以不配
knife4j:
  enable: true
  setting:
    language: zh_cn

# AI
langchain4j:
  open-ai:
    chat-model:
      base-url: https://api.deepseek.com
      api-key: <deepseek_api_key>
      model-name: deepseek-chat
      log-requests: true
      log-responses: true
      #      strict-json-schema: true
      #      response-format: json_object
      max-tokens: 8192
      timeout: 60000
      max-retries: 3

    # 流式输出 AI 模型配置（用于实时生成文本）
    streaming-chat-model:
      base-url: https://api.deepseek.com
      api-key: <deepseek_api_key>
      model-name: deepseek-chat
      max-tokens: 8192
      log-requests: true
      log-responses: true
      timeout: 60000

    # 推理 AI 模型配置（用于复杂的推理任务）
    reasoning-streaming-chat-model:
      base-url: https://api.deepseek.com
      api-key: <deepseek_api_key>
      model-name: deepseek-chat
      max-tokens: 8192
      temperature: 0.1
      log-requests: true
      log-responses: true
      timeout: 60000

    # 智能路由 AI 模型配置（用于简单的分类任务）
    routing-chat-model:
      base-url: https://dashscope.aliyuncs.com/compatible-mode/v1
      api-key: <dashscope_api_key>
      model-name: qwen-turbo
      log-requests: true
      log-responses: true
      max-tokens: 100

# 添加 COS 对象存储配置（需要从腾讯云获取）
cos:
  client:
    host: <cos_host>
    secretId: <cos_secret_id>
    secretKey: <cos_secret_key>
    region: <cos_region>
    bucket: <cos_bucket>

# 阿里云 DashScope 配置
dashscope:
  api-key: <dashscope_api_key>
  image-model: wan2.2-t2i-flash




